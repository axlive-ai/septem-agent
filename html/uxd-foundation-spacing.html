    <div class="page-title">Spacing</div>
    <div class="prose"><p class="lead">4와 8의 배수를 기본 단위로 하는 간격 체계예요. 컴포넌트 내부 패딩, 요소 간격, 블록·섹션 간 간격에 동일한 스케일을 적용해 화면의 리듬을 통일해요.</p></div>
