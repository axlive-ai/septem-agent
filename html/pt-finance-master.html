<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NH AI 금융비서 · 페르소나별 프로토타입 (NDS 적용)</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root{
    /* ============ NDS Primitive → Semantic tokens (NH Design System 원본 값) ============ */
    --green:#1AA63C;        /* Point Color · Green 500 */
    --green-d:#0E8A2E;      /* Green pressed / dark text on soft bg */
    --green-soft:#E7F5EC;   /* Green 50 계열 */
    --ink:#121212; --ink-2:#343434; --ink-3:#505050; --ink-4:#767676; --ink-5:#909090;
    --blue:#2A6FF0;         /* Positive Color */
    --red:#E5484D;          /* Negative Color */
    --red-soft:#FEE4E2; --red-d:#B42318;   /* NDS tag.req 조합 그대로 사용 */
    --orange:#F79009; --orange-d:#B54708;  /* NDS Label 라인 컬러 조합 그대로 사용 */
    --orange-soft:#FDF1E0;  /* ※ 배경 tint는 NDS에 별도 정의가 없어 green-soft와 동일한 비율로 추정 보간한 값입니다 */
    --line:#EAECEF; --line-2:#E0E3E8;
    --bg:#FFFFFF; --soft:#F6F7F9; --soft-2:#F0F2F5;
    --card-dark:#0B0C0E; --card-dark-2:#15171B; /* NDS 다크모드 카드 색 (Toast 등에서 사용) */
    --sans:"Pretendard Variable",Pretendard,-apple-system,system-ui,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;

    /* Radius — NDS Shape: 0,4,8,10,12,14,16, circle=999 */
    --r-sm:8px; --r-md:10px; --r-lg:12px; --r-xl:14px; --r-2xl:16px; --r-pill:999px;

    /* Spacing — NDS 8pt grid (2,4,8,12,16,20,24,32,40,64,80) */
    --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px; --sp-6:24px; --sp-7:32px;

    /* Typography scale — NDS Font Scale (size/line-height) */
    --t-h2:22px; --t-h2-lh:32px;      /* H2 */
    --t-h3:20px; --t-h3-lh:28px;      /* H3 */
    --t-h4:18px; --t-h4-lh:26px;      /* H4 */
    --t-h5:16px; --t-h5-lh:24px;      /* H5 */
    --t-b1:16px; --t-b1-lh:24px;      /* Body1 */
    --t-b2:15px; --t-b2-lh:24px;      /* Body2 */
    --t-b3:14px; --t-b3-lh:22px;      /* Body3 */
    --t-c1:13px; --t-c1-lh:20px;      /* Caption1 */
    --t-c3:10px; --t-c3-lh:15px;      /* Caption3 */

    /* ---- 화면별 역할 매핑 (general 기준값. persona별로 override) ---- */
    --fs-topbar:  var(--t-h5); --lh-topbar: var(--t-h5-lh);
    --fs-greeting:var(--t-h3); --lh-greeting: var(--t-h3-lh);
    --fs-bubble:  var(--t-b2); --lh-bubble: var(--t-b2-lh);
    --fs-cardtitle:var(--t-c1); --lh-cardtitle: var(--t-c1-lh);
    --fs-kv:      var(--t-b3); --lh-kv: var(--t-b3-lh);
    --fs-chip:    var(--t-c1); --lh-chip: var(--t-c1-lh);
    --fs-sub:     var(--t-c1); --lh-sub: var(--t-c1-lh);
    --fs-back:    var(--t-c1); --lh-back: var(--t-c1-lh);
    --fs-btn:     16px;        --lh-btn: 24px;
    --fs-status-title: var(--t-h4); --lh-status-title: var(--t-h4-lh);
    --fs-status-sub:   var(--t-b3); --lh-status-sub: var(--t-b3-lh);
    --fs-auth-caption: var(--t-b2); --lh-auth-caption: var(--t-b2-lh);
    --fs-stepper: var(--t-h4);
    --btn-pad-v:16px; --chip-pad:8px 16px; --mic-size:48px; --auth-size:88px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--sans);
    background:linear-gradient(180deg,#F6F7F9 0%,#EAECEF 100%);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:36px 16px 60px;
    -webkit-font-smoothing:antialiased;
    letter-spacing:-.01em;
  }
  .stage-label{
    font-size:var(--t-c1); letter-spacing:.05em; color:var(--ink-4);
    margin-bottom:6px; text-transform:uppercase; font-weight:700;
  }
  .stage-title{
    font-size:var(--t-h2); font-weight:800; color:var(--ink);
    margin-bottom:22px; text-align:center; letter-spacing:-.02em;
  }
  .stage-title span{color:var(--green-d);}

  /* ---------- persona switcher ---------- */
  .persona-switch{display:flex; gap:8px; margin-bottom:22px; flex-wrap:wrap; justify-content:center;}
  .persona-btn{
    display:flex; align-items:center; gap:6px;
    border:1.5px solid var(--line-2);
    background:var(--bg);
    color:var(--ink-4);
    font-weight:700;
    font-size:var(--t-c1);
    padding:9px 16px;
    border-radius:var(--r-pill);
    cursor:pointer;
    transition:all .15s;
    font-family:inherit;
  }
  .persona-btn .ic{font-size:15px;}
  .persona-btn:active{transform:scale(.96);}
  .persona-btn.active{background:var(--ink);border-color:var(--ink);color:#fff;}
  .persona-btn.active[data-p="general"]{background:var(--green-d);border-color:var(--green-d);}
  .persona-btn.active[data-p="teen"]{background:#7C4DFF;border-color:#7C4DFF;}
  .persona-btn.active[data-p="foreigner"]{background:var(--blue);border-color:var(--blue);}

  /* ---------- phone frame ---------- */
  .phone{
    position:relative; width:375px; height:812px; background:var(--bg);
    border-radius:44px;
    box-shadow:0 30px 60px -20px rgba(18,18,18,.28), 0 0 0 10px var(--ink);
    overflow:hidden; flex-shrink:0; transition:background .2s ease;
  }
  .notch{
    position:absolute; top:0; left:50%; transform:translateX(-50%);
    width:150px; height:26px; background:var(--ink); border-radius:0 0 var(--r-2xl) var(--r-2xl); z-index:50;
  }
  .screen{
    position:absolute; inset:0; display:flex; flex-direction:column;
    opacity:0; transform:translateX(16px); pointer-events:none;
    transition:opacity .3s cubic-bezier(.16,1,.3,1), transform .3s cubic-bezier(.16,1,.3,1);
  }
  .screen.active{opacity:1; transform:translateX(0); pointer-events:auto;}

  /* ---------- shared header ---------- */
  .topbar{
    padding:44px var(--sp-5) var(--sp-3);
    display:flex; align-items:center; gap:var(--sp-3);
    background:var(--bg); border-bottom:1px solid var(--line); flex-shrink:0;
  }
  .mark{width:26px;height:26px;border-radius:7px;background:var(--green);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .mark svg{width:15px;height:15px;}
  .topbar h1{font-size:var(--fs-topbar);line-height:var(--lh-topbar);font-weight:700;color:var(--ink);margin:0;}
  .topbar .back{
    margin-left:auto; font-size:var(--fs-back); color:var(--ink-4);
    background:var(--soft-2); border:none; padding:7px 12px; border-radius:var(--r-pill); cursor:pointer;
    font-family:inherit; transition:transform .12s cubic-bezier(.34,1.56,.64,1), background .12s ease;
  }
  .topbar .back:active{background:var(--line-2); transform:scale(.93);}
  .lang-flag{
    display:none; margin-left:auto; font-size:11px; font-weight:700; color:var(--blue);
    background:#EAF1FE; border:1.5px solid #CFDFFB; padding:5px 10px; border-radius:var(--r-sm);
  }

  .body{flex:1; overflow-y:auto; padding:var(--sp-5) var(--sp-5) var(--sp-4); display:flex; flex-direction:column; gap:var(--sp-4);}

  /* ---------- Kakaobank 스타일 말풍선/카드 등장 애니메이션 ---------- */
  @keyframes popIn{
    from{opacity:0; transform:translateY(10px) scale(.97);}
    to{opacity:1; transform:translateY(0) scale(1);}
  }
  .screen.active .body > *{
    animation:popIn .38s cubic-bezier(.34,1.56,.64,1) both;
  }
  .screen.active .body > *:nth-child(1){animation-delay:.05s;}
  .screen.active .body > *:nth-child(2){animation-delay:.55s;}
  .screen.active .body > *:nth-child(3){animation-delay:1.05s;}
  .screen.active .body > *:nth-child(4){animation-delay:1.55s;}
  .screen.active .body > *:nth-child(5){animation-delay:2.05s;}
  .screen.active .body > *:nth-child(6){animation-delay:2.55s;}

  /* ---------- chat bubbles ---------- */
  .bubble{max-width:84%; padding:12px 16px; border-radius:var(--r-2xl); font-size:var(--fs-bubble); line-height:var(--lh-bubble);}
  .bubble.ai{background:var(--green-soft); color:var(--ink); border:1px solid #D3ECDD; align-self:flex-start; border-bottom-left-radius:4px;}
  .bubble.user{background:var(--ink); color:#fff; align-self:flex-end; border-bottom-right-radius:4px;}
  .bubble .eyebrow{display:block; font-size:12px; color:var(--green-d); font-weight:700; margin-bottom:4px; letter-spacing:.06em; text-transform:uppercase;}
  .i18n-en{display:block; font-size:0.86em; color:var(--ink-4); margin-top:3px; font-style:italic;}

  /* ---------- cards (NDS Card · general/list, account/list) ---------- */
  .card{background:var(--bg); border:1px solid var(--line); border-radius:var(--r-xl); padding:18px;}
  .card h3{margin:0 0 10px; font-size:var(--fs-cardtitle); line-height:var(--lh-cardtitle); color:var(--ink-4); font-weight:700;}
  .kv{display:flex; justify-content:space-between; font-size:var(--fs-kv); line-height:var(--lh-kv); padding:7px 0; border-bottom:1px solid var(--line); gap:10px;}
  .kv:last-child{border-bottom:none;}
  .kv .k{color:var(--ink-4); flex-shrink:0;}
  .kv .v{font-weight:600; color:var(--ink); text-align:right;}

  .acct-row{display:flex;align-items:center;gap:10px;margin-bottom:2px;}
  .acct-avatar{width:36px;height:36px;border-radius:50%;background:var(--green);
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px;flex-shrink:0;}
  .acct-meta .name{font-weight:700;font-size:var(--t-b3);color:var(--ink);}
  .acct-meta .num{font-size:12px;color:var(--ink-5);margin-top:1px;}

  /* NDS Label — line/orange (caution), fill (product) */
  .badge{display:inline-block; font-size:11px; font-weight:700; padding:2px 8px; border-radius:var(--r-sm);
    border:1.5px solid var(--orange); color:var(--orange-d); margin-left:6px;}

  /* NDS Infobox 기반 + Negative/Caution 컬러 적용 */
  .warn-card{background:var(--orange-soft); border:1px solid var(--orange); border-radius:var(--r-lg); padding:16px 18px;}
  .warn-card .title{display:flex; align-items:center; gap:8px; font-weight:700; color:var(--orange-d); font-size:var(--t-b3); margin-bottom:8px;}
  .warn-card ul{margin:8px 0 0; padding-left:16px; font-size:var(--t-c1); color:var(--ink-3); list-style:none;}
  .warn-card li{margin-bottom:4px; position:relative; padding-left:2px;}
  .warn-card li::before{content:""; position:absolute; left:-14px; top:8px; width:5px; height:5px; border-radius:50%; background:var(--orange);}

  .danger-card{background:var(--red-soft); border:1px solid var(--red); border-radius:var(--r-lg); padding:16px 18px;}
  .danger-card .title{display:flex; align-items:center; gap:8px; font-weight:700; color:var(--red-d); font-size:var(--t-b3); margin-bottom:8px;}
  .danger-card p{font-size:var(--t-c1); color:var(--ink-3); margin:0; line-height:1.6;}

  /* NDS Chip · basic (unselected) */
  .chip-row{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{background:var(--soft-2); border:none; border-radius:var(--r-pill); padding:var(--chip-pad);
    font-size:var(--fs-chip); line-height:var(--lh-chip); cursor:pointer; color:var(--ink-4); font-weight:600;
    transition:transform .12s cubic-bezier(.34,1.56,.64,1), background .12s ease;}
  .chip:active{background:var(--line-2); color:var(--ink-3); transform:scale(.95);}

  /* ---------- footer / buttons (NDS Button · basic, cta) ---------- */
  .footer{padding:var(--sp-4) var(--sp-5) 26px; border-top:1px solid var(--line); display:flex; flex-direction:column; gap:10px; background:var(--bg);}
  .btn{width:100%; border:none; border-radius:var(--r-lg); padding:var(--btn-pad-v); font-size:var(--fs-btn); line-height:var(--lh-btn);
    font-weight:700; cursor:pointer; text-align:center; font-family:inherit;
    transition:transform .12s cubic-bezier(.34,1.56,.64,1), background .12s ease;}
  .btn:active{transform:scale(.965);}
  .btn-primary{background:var(--green); color:#fff;}
  .btn-primary:active{background:var(--green-d); transform:scale(.965);}
  .btn-secondary{background:var(--soft-2); color:var(--ink-3);}
  .btn-secondary:active{background:var(--line-2); transform:scale(.965);}
  .btn-warn{background:var(--orange); color:#fff;}
  .btn-warn:active{background:var(--orange-d); transform:scale(.965);}
  .btn-ghost{background:transparent; color:var(--ink-4); text-decoration:underline; font-weight:500; font-size:var(--t-c1); padding:6px;}

  /* ---------- home screen ---------- */
  .greeting{font-size:var(--fs-greeting); line-height:var(--lh-greeting); font-weight:700; color:var(--ink); margin:6px 0 2px;}
  .greeting .accent{color:var(--green-d);}
  .sub{font-size:var(--fs-sub); line-height:var(--lh-sub); color:var(--ink-4); margin-bottom:10px;}
  .input-bar{display:flex; align-items:center; gap:10px; background:var(--soft-2); border-radius:var(--r-pill); padding:6px 8px 6px 18px; border:1.5px solid var(--line-2);}
  .input-bar input{flex:1; border:none; background:none; font-size:var(--t-b3); outline:none; color:var(--ink); font-family:inherit;}
  .mic-btn{width:var(--mic-size); height:var(--mic-size); border-radius:50%; background:var(--green); border:none; color:#fff; font-size:17px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    transition:transform .12s cubic-bezier(.34,1.56,.64,1);}
  .mic-btn:active{transform:scale(.9);}
  .mic-btn.pulse{animation:pulse 1.4s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(26,166,60,.35);}70%{box-shadow:0 0 0 12px rgba(26,166,60,0);}100%{box-shadow:0 0 0 0 rgba(26,166,60,0);}}

  /* ---------- stepper (NDS Controls · stepper) ---------- */
  .stepper{display:flex; align-items:center; justify-content:center; gap:0; border:1px solid var(--line-2); border-radius:var(--r-md); overflow:hidden; background:var(--bg);}
  .stepper button{width:40px; height:40px; background:var(--bg); border:none; cursor:pointer; font-size:18px; color:var(--ink-4); transition:transform .12s cubic-bezier(.34,1.56,.64,1), background .12s ease;}
  .stepper button:active{background:var(--soft-2); transform:scale(.88);}
  .stepper .amount{font-size:var(--fs-stepper); font-weight:700; min-width:120px; text-align:center; height:40px; line-height:40px; border-left:1px solid var(--line-2); border-right:1px solid var(--line-2); color:var(--ink);}

  /* ---------- auth screen ---------- */
  .auth-center{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;}
  .fingerprint{width:var(--auth-size); height:var(--auth-size); border-radius:50%; background:var(--green-soft); border:2px solid var(--green); display:flex; align-items:center; justify-content:center; font-size:36px; cursor:pointer; color:var(--green-d); transition:transform .15s cubic-bezier(.34,1.56,.64,1), background .2s ease;}
  .fingerprint:active{transform:scale(.94);}
  .fingerprint.success{background:var(--green); color:#fff; border-color:var(--green); animation:successBounce .5s cubic-bezier(.34,1.56,.64,1);}
  @keyframes successBounce{
    0%{transform:scale(1);}
    40%{transform:scale(1.18);}
    100%{transform:scale(1);}
  }
  .auth-caption{font-size:var(--fs-auth-caption); line-height:var(--lh-auth-caption); color:var(--ink-3); text-align:center; padding:0 24px;}

  /* ---------- complete / status screens ---------- */
  .status-center{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; text-align:center; padding:0 20px;}
  .status-icon{width:64px; height:64px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px;}
  .status-icon.ok{background:var(--green-soft); color:var(--green-d);}
  .status-icon.stop{background:var(--orange-soft); color:var(--orange-d);}
  .status-title{font-size:var(--fs-status-title); line-height:var(--lh-status-title); font-weight:700; color:var(--ink);}
  .status-sub{font-size:var(--fs-status-sub); line-height:var(--lh-status-sub); color:var(--ink-3);}
  .spinner{width:20px; height:20px; border-radius:50%; border:3px solid var(--green-soft); border-top-color:var(--green); animation:spin .9s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ---------- presenter control bar ---------- */
  .control-bar{margin-top:26px; width:375px; background:var(--bg); border:1px solid var(--line); border-radius:var(--r-2xl); padding:16px; display:flex; flex-direction:column; gap:10px;}
  .control-bar .label{font-size:12px; color:var(--ink-4); font-weight:700; margin-bottom:2px;}
  .control-row{display:flex; gap:8px; flex-wrap:wrap;}
  .ctrl-btn{flex:1; min-width:100px; border:1px solid var(--line-2); background:var(--soft-2); border-radius:var(--r-sm); padding:9px 8px; font-size:12px; font-weight:600; color:var(--ink-3); cursor:pointer; font-family:inherit;}
  .ctrl-btn:active{background:var(--line-2);}
  .ctrl-btn.danger-outline{border-color:var(--red); color:var(--red-d);}
  .ctrl-btn.gold-outline{border-color:var(--orange); color:var(--orange-d);}
  .disclaimer{font-size:12px; color:var(--ink-4); text-align:center; max-width:375px; margin-top:14px; line-height:1.6;}
  .disclaimer b{color:var(--ink-3);}

  /* =========================================================
     PERSONA OVERRIDES
     ========================================================= */

  /* ---- SENIOR: NDS 타입 스케일 '한 단계 위' 적용 + 터치영역 확장 + 선택지 축소 ---- */
  .phone.persona-senior{
    --fs-topbar: var(--t-h4); --lh-topbar: var(--t-h4-lh);
    --fs-greeting: var(--t-h2); --lh-greeting: var(--t-h2-lh);
    --fs-bubble: var(--t-b1); --lh-bubble: var(--t-b1-lh);
    --fs-cardtitle: var(--t-b3); --lh-cardtitle: var(--t-b3-lh);
    --fs-kv: var(--t-b1); --lh-kv: var(--t-b1-lh);
    --fs-chip: var(--t-b3); --lh-chip: var(--t-b3-lh);
    --fs-sub: var(--t-b3); --lh-sub: var(--t-b3-lh);
    --fs-back: var(--t-b3); --lh-back: var(--t-b3-lh);
    --fs-btn: var(--t-h5); --lh-btn: var(--t-h5-lh);
    --fs-status-title: var(--t-h3); --lh-status-title: var(--t-h3-lh);
    --fs-status-sub: var(--t-b1); --lh-status-sub: var(--t-b1-lh);
    --fs-auth-caption: var(--t-h5); --lh-auth-caption: var(--t-h5-lh);
    --btn-pad-v:20px; --chip-pad:14px 18px; --mic-size:58px; --auth-size:112px;
    --line:#C9D3C6; --line-2:#C9D3C6;
  }
  .phone.persona-senior .chip-row .chip:nth-child(3){display:none;}
  .phone.persona-senior .card, .phone.persona-senior .warn-card, .phone.persona-senior .danger-card{border-width:1.5px;}
  .phone.persona-senior .mic-btn.pulse{animation-duration:2s;}

  /* ---- TEEN: NDS 다크모드 뉴트럴(#0B0C0E/#15171B) 위에 세그먼트 전용 포인트 컬러(네온) 오버레이 ---- */
  .phone.persona-teen{background:var(--card-dark);}
  .phone.persona-teen .topbar{background:var(--card-dark-2); border-bottom:1px solid #24262B;}
  .phone.persona-teen .topbar h1{color:#F5F6F7; font-weight:800;}
  .phone.persona-teen .topbar .back{background:#20232A; color:#B9A6FF;}
  .phone.persona-teen .mark{background:linear-gradient(135deg,#FF3D81,#7C4DFF);}
  .phone.persona-teen .body{background:transparent;}
  .phone.persona-teen .bubble.ai{background:#1B1D22; color:#F1F2F4; border:1px solid #2A2D34;}
  .phone.persona-teen .bubble.user{background:linear-gradient(135deg,#FF3D81,#7C4DFF); color:#fff;}
  .phone.persona-teen .bubble .eyebrow{color:#C6FF3D;}
  .phone.persona-teen .card{background:#15171B; border:1px solid #2A2D34; color:#F1F2F4;}
  .phone.persona-teen .card h3{color:#9AA0AC;}

<body>

  <div class="stage-title">NH AI 금융비서 AX프로토타입</div>

  <div class="persona-switch" id="personaSwitch">
    <button class="persona-btn" data-p="teen"><span class="ic">🎧</span>틴에이저</button>
    <button class="persona-btn active" data-p="general"><span class="ic">🙂</span>일반</button>
    <button class="persona-btn" data-p="senior"><span class="ic">🧓</span>시니어</button>
    <button class="persona-btn" data-p="foreigner"><span class="ic">🌍</span>외국인</button>
  </div>

  <div class="phone" id="phone">
    <div class="notch"></div>

    <!-- 1. HOME -->
    <div class="screen active" id="screen-home">
      <div class="topbar">
        <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/><path d="M12 3v18M4 7.5l8 4.5 8-4.5"/></svg></div>
        <h1 data-key="home.h1"></h1>
        <span class="lang-flag">EN / KO</span>
      </div>
      <div class="body">
        <div class="greeting" data-key="home.greeting"></div>
        <div class="sub" data-key="home.sub"></div>
        <div class="chip-row">
          <div class="chip" data-key="home.chip1" onclick="sendExample()"></div>
          <div class="chip" data-key="home.chip2"></div>
          <div class="chip" data-key="home.chip3"></div>
        </div>
        <div class="card" style="margin-top:auto;">
          <h3 data-key="home.recentTitle"></h3>
          <div class="kv"><span class="k" data-key="home.recent1k"></span><span class="v" data-key="home.recent1v"></span></div>
          <div class="kv"><span class="k" data-key="home.recent2k"></span><span class="v" data-key="home.recent2v"></span></div>
        </div>
      </div>
      <div class="footer" style="padding-top:10px;">
        <div class="input-bar">
          <input id="homeInput" placeholder="" readonly>
          <button class="mic-btn" onclick="startTransfer()">🎙</button>
        </div>
      </div>
    </div>

    <!-- 2. INPUT -->
    <div class="screen" id="screen-input">
      <div class="topbar">
        <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/><path d="M12 3v18M4 7.5l8 4.5 8-4.5"/></svg></div>
        <h1 data-key="input.h1"></h1>
        <button class="back" onclick="goTo('home')" data-key="input.back"></button>
      </div>
      <div class="body" style="align-items:center;justify-content:center;">
        <div class="mic-btn pulse" style="width:72px;height:72px;font-size:26px;">🎙</div>
        <div class="sub" style="text-align:center;margin-top:8px;" data-key="input.listening"></div>
        <div class="bubble user" style="margin-top:18px;" data-key="input.userBubble"></div>
      </div>
      <div class="footer">
        <button class="btn btn-primary" onclick="goTo('intent')" data-key="input.submitBtn"></button>
      </div>
    </div>

    <!-- 3. INTENT CONFIRM -->
    <div class="screen" id="screen-intent">
      <div class="topbar">
        <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/><path d="M12 3v18M4 7.5l8 4.5 8-4.5"/></svg></div>
        <h1 data-key="intent.h1"></h1>
        <button class="back" onclick="goTo('home')" data-key="intent.back"></button>
      </div>
      <div class="body">
        <div class="bubble user" data-key="input.userBubble"></div>
        <div class="bubble ai" data-key="intent.aiBubble"></div>
        <div class="card">
          <h3 data-key="intent.summaryTitle"></h3>
          <div class="kv"><span class="k" data-key="intent.typeLabel"></span><span class="v" data-key="intent.typeVal"></span></div>
          <div class="kv"><span class="k" data-key="intent.targetLabel"></span><span class="v" data-key="intent.targetVal"></span></div>
          <div class="kv"><span class="k" data-key="intent.amountLabel"></span><span class="v" data-key="intent.amountVal"></span></div>
        </div>
      </div>
      <div class="footer">
        <button class="btn btn-primary" onclick="goTo('recipient')" data-key="intent.confirmBtn"></button>
        <button class="btn btn-secondary" onclick="goTo('home')" data-key="intent.retryBtn"></button>
      </div>
    </div>

    <!-- 4. RECIPIENT / AMOUNT CONFIRM -->
    <div class="screen" id="screen-recipient">
      <div class="topbar">
        <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/><path d="M12 3v18M4 7.5l8 4.5 8-4.5"/></svg></div>
        <h1 data-key="recipient.h1"></h1>
        <button class="back" onclick="goTo('intent')" data-key="recipient.back"></button>
      </div>
      <div class="body">
        <div class="bubble ai" data-key="recipient.aiBubble"></div>
        <div class="card">
          <h3 data-key="recipient.recipientTitle"></h3>
          <div class="acct-row">
            <div class="acct-avatar" data-key-init="recipient.nameVal">NH</div>
            <div class="acct-meta">
              <div class="name"><span data-key="recipient.nameVal"></span><span class="badge" data-key="recipient.badge"></span></div>
              <div class="num" data-key="recipient.acctVal"></div>
            </div>
          </div>
        </div>
        <div class="card">
          <h3 data-key="recipient.amountTitle"></h3>
          <div class="stepper">
            <button onclick="return false;">−</button>
            <div class="amount" data-key="recipient.amountVal"></div>
            <button onclick="return false;">+</button>
          </div>
        </div>
        <div class="card">
          <h3 data-key="recipient.sourceTitle"></h3>
          <div class="kv"><span class="k" data-key="recipient.sourceLabel"></span><span class="v" data-key="recipient.sourceVal"></span></div>
        </div>
      </div>
      <div class="footer">
        <button class="btn btn-primary" onclick="goTo('riskAlert')" data-key="recipient.nextBtn"></button>
      </div>
    </div>

    <!-- 5. RISK ALERT -->
    <div class="screen" id="screen-riskAlert">
      <div class="topbar">
        <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/><path d="M12 3v18M4 7.5l8 4.5 8-4.5"/></svg></div>
        <h1 data-key="riskAlert.h1"></h1>
        <button class="back" onclick="goTo('recipient')" data-key="riskAlert.back"></button>
      </div>
      <div class="body">
        <div class="warn-card">
          <div class="title" data-key="riskAlert.warnTitle"></div>
          <ul>
            <li data-key="riskAlert.bullet1"></li>
            <li data-key="riskAlert.bullet2"></li>
          </ul>
        </div>
        <div class="bubble ai" data-key="riskAlert.aiBubble"></div>
      </div>
      <div class="footer">
        <button class="btn btn-warn" onclick="goTo('followup')" data-key="riskAlert.continueBtn"></button>
        <button class="btn btn-secondary" onclick="goTo('cancelled')" data-key="riskAlert.cancelBtn"></button>
      </div>
    </div>

    <!-- 6. FOLLOW-UP QUESTION -->
    <div class="screen" id="screen-followup">
      <div class="topbar">
        <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/><path d="M12 3v18M4 7.5l8 4.5 8-4.5"/></svg></div>
        <h1 data-key="followup.h1"></h1>
        <button class="back" onclick="goTo('riskAlert')" data-key="followup.back"></button>
      </div>
      <div class="body">
        <div class="bubble ai" data-key="followup.question"></div>
      </div>
      <div class="footer">
        <button class="btn btn-warn" onclick="goTo('warning2')" data-key="followup.yesBtn"></button>
        <button class="btn btn-secondary" onclick="goTo('finalApproval')" data-key="followup.noBtn"></button>
      </div>
    </div>

    <!-- 7. VOICE PHISHING WARNING -->
    <div class="screen" id="screen-warning2">
      <div class="topbar">
        <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/><path d="M12 3v18M4 7.5l8 4.5 8-4.5"/></svg></div>
        <h1 data-key="warning2.h1"></h1>
        <button class="back" onclick="goTo('followup')" data-key="warning2.back"></button>
      </div>
      <div class="body">
        <div class="danger-card">
          <div class="title" data-key="warning2.dangerTitle"></div>
          <p data-key="warning2.dangerText"></p>
        </div>
        <div class="bubble ai" data-key="warning2.aiBubble"></div>
      </div>
      <div class="footer">
        <button class="btn btn-secondary" onclick="goTo('finalApproval')" data-key="warning2.confirmedBtn"></button>
        <button class="btn btn-primary" onclick="goTo('counselor')" data-key="warning2.counselorBtn"></button>
        <button class="btn btn-ghost" onclick="goTo('cancelled')" data-key="warning2.cancelBtn"></button>
      </div>
    </div>

    <!-- 8. FINAL APPROVAL -->
    <div class="screen" id="screen-finalApproval">
      <div class="topbar">
        <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/><path d="M12 3v18M4 7.5l8 4.5 8-4.5"/></svg></div>
        <h1 data-key="finalApproval.h1"></h1>
        <button class="back" onclick="goTo('followup')" data-key="finalApproval.back"></button>
      </div>
      <div class="body">
        <div class="bubble ai" data-key="finalApproval.aiBubble"></div>
        <div class="card">
          <div class="kv"><span class="k" data-key="finalApproval.recipientLabel"></span><span class="v" data-key="finalApproval.recipientVal"></span></div>
          <div class="kv"><span class="k" data-key="finalApproval.amountLabel"></span><span class="v" data-key="finalApproval.amountVal"></span></div>
          <div class="kv"><span class="k" data-key="finalApproval.acctLabel"></span><span class="v" data-key="finalApproval.acctVal"></span></div>
          <div class="kv"><span class="k" data-key="finalApproval.feeLabel"></span><span class="v" data-key="finalApproval.feeVal"></span></div>
          <div class="kv"><span class="k" data-key="finalApproval.timeLabel"></span><span class="v" data-key="finalApproval.timeVal"></span></div>
        </div>
      </div>
      <div class="footer">
        <button class="btn btn-primary" onclick="goTo('auth')" data-key="finalApproval.confirmBtn"></button>
        <button class="btn btn-secondary" onclick="goTo('cancelled')" data-key="finalApproval.cancelBtn"></button>
      </div>
    </div>

    <!-- 9. AUTH -->
    <div class="screen" id="screen-auth">
      <div class="topbar">
        <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/><path d="M12 3v18M4 7.5l8 4.5 8-4.5"/></svg></div>

      </div>
      <div class="auth-center">
        <div class="fingerprint" id="fingerprintIcon" onclick="doAuth()">🔒</div>
        <div class="auth-caption" id="authCaption" data-key="auth.caption"></div>
      </div>
    </div>

    <!-- 10a. COMPLETE -->
    <div class="screen" id="screen-complete">
      <div class="topbar">
        <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/><path d="M12 3v18M4 7.5l8 4.5 8-4.5"/></svg></div>
        <h1 data-key="complete.h1"></h1>
      </div>
      <div class="status-center">
        <div class="status-icon ok">✓</div>
        <div class="status-title" data-key="complete.title"></div>
        <div class="status-sub" data-key="complete.sub"></div>
      </div>
      <div class="footer">
        <button class="btn btn-primary" onclick="resetDemo()" data-key="complete.homeBtn"></button>
      </div>
    </div>

    <!-- 10b. CANCELLED -->
    <div class="screen" id="screen-cancelled">
      <div class="topbar">
        <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/><path d="M12 3v18M4 7.5l8 4.5 8-4.5"/></svg></div>
        <h1 data-key="cancelled.h1"></h1>
      </div>
      <div class="status-center">
        <div class="status-icon stop">⏸</div>
        <div class="status-title" data-key="cancelled.title"></div>
        <div class="status-sub" data-key="cancelled.sub"></div>
      </div>
      <div class="footer">
        <button class="btn btn-primary" onclick="resetDemo()" data-key="cancelled.homeBtn"></button>
      </div>
    </div>

    <!-- 10c. COUNSELOR -->
    <div class="screen" id="screen-counselor">
      <div class="topbar">
        <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/><path d="M12 3v18M4 7.5l8 4.5 8-4.5"/></svg></div>
        <h1 data-key="counselor.h1"></h1>
      </div>
      <div class="status-center" id="counselorWait">
        <div class="spinner"></div>
        <div class="status-title" data-key="counselor.title"></div>
        <div class="status-sub" data-key="counselor.sub"></div>
      </div>
      <div class="footer">
        <button class="btn btn-primary" onclick="resetDemo()" data-key="counselor.homeBtn"></button>
      </div>
    </div>

  </div>

  <div class="control-bar">
    <div class="label">발표자 컨트롤</div>
    <div class="control-row">
      <button class="ctrl-btn" onclick="resetDemo()">처음부터 다시</button>
      <button class="ctrl-btn gold-outline" onclick="jumpTo('finalApproval')">정상 완료 직전으로 건너뛰기</button>
      <button class="ctrl-btn danger-outline" onclick="jumpTo('warning2')">위험 감지 화면으로 건너뛰기</button>
    </div>
  </div>

  <div class="disclaimer">
    * 본 데모는 시연용 프로토타입이며 등장하는 고객명·계좌·금액·위험도 판단은 모두 가상의 예시입니다.<br>

  </div>

/* =========================================================
   RENDER / STATE
   ========================================================= */
let currentPersona = 'general';

function renderPersona(p){
  currentPersona = p;
  const phone = document.getElementById('phone');
  phone.className = 'phone persona-' + p;

  document.querySelectorAll('#personaSwitch .persona-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.p === p);
  });

  document.querySelectorAll('[data-key]').forEach(el=>{
    const key = el.getAttribute('data-key');
    if(COPY[p] && COPY[p][key] !== undefined){
      el.innerHTML = COPY[p][key];
    }
  });

  const homeInput = document.getElementById('homeInput');
  if(homeInput && COPY[p]['home.inputPh']) homeInput.placeholder = COPY[p]['home.inputPh'];

  resetAuthVisual();
  goTo('home');
}

document.querySelectorAll('#personaSwitch .persona-btn').forEach(btn=>{
  btn.addEventListener('click', ()=> renderPersona(btn.dataset.p));
});

function goTo(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById('screen-' + id);
  if(target){
    // 같은 화면을 다시 보여줄 때도(예: 페르소나 전환 시 홈으로 복귀) 애니메이션이
    // 재생되도록 remove와 add 사이에 강제로 리플로우를 발생시킵니다.
    void target.offsetWidth;
    target.classList.add('active');
  }
}

function startTransfer(){
  goTo('input');
}

function sendExample(){
  // 예시 칩을 탭하는 건 '말하기'가 아니라 '이미 입력한 문장을 보내는 것'이라
  // 듣고 있어요 화면을 거치지 않고 바로 채팅 흐름(의도 확인)으로 넘어갑니다.
  goTo('intent');
}

function resetAuthVisual(){
  const fp = document.getElementById('fingerprintIcon');
  if(fp){ fp.classList.remove('success'); fp.textContent = '🔒'; }
  const cap = document.getElementById('authCaption');
  if(cap){ cap.innerHTML = COPY[currentPersona]['auth.caption']; }
}

function resetDemo(){
  resetAuthVisual();
  goTo('home');
}

function doAuth(){
  const fp = document.getElementById('fingerprintIcon');
  const cap = document.getElementById('authCaption');
  fp.textContent = '✓';
  fp.classList.add('success');
  cap.innerHTML = COPY[currentPersona]['auth.captionSuccess'];
  setTimeout(() => { goTo('complete'); }, 700);
}

function jumpTo(screenId){
  goTo(screenId);
}

renderPersona('general');
</script>
