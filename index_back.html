<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NH AI Agent UX Guide System</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #3182F6;
  --blue-bg: #EBF2FE;
  --text-1: #191F28;
  --text-2: #4E5968;
  --text-3: #8B95A1;
  --border: #F2F4F6;
  --border-strong: #E5E8EB;
  --bg: #FFFFFF;
  --bg-soft: #F9FAFB;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Noto Sans KR', Helvetica, Arial, sans-serif;
  color: var(--text-1);
  background: var(--bg);
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
}

/* ===== 상단 바 ===== */
.topbar {
  height: 68px;
  border-bottom: 1px solid var(--border-strong);
  display: flex;
  align-items: center;
  padding: 0 36px;
  gap: 24px;
  position: fixed;
  top: 0; left: 0; right: 0;
  background: var(--bg);
  z-index: 100;
}
.logo {
  font-size: 19px;
  font-weight: 700;
  color: var(--text-1);
  display: flex;
  align-items: center;
  gap: 10px;
  white-space: nowrap;
}
.logo .badge {
  font-size: 12px;
  font-weight: 600;
  color: var(--blue);
  background: var(--blue-bg);
  padding: 4px 10px;
  border-radius: 12px;
  letter-spacing: 0.02em;
}
.search-wrap {
  margin-left: auto;
  width: 340px;
}
.search-box {
  width: 100%;
  height: 44px;
  border: 1px solid var(--border-strong);
  border-radius: 10px;
  padding: 0 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--text-3);
  font-size: 15px;
  background: var(--bg-soft);
}
.search-box svg { flex-shrink: 0; width: 18px; height: 18px; }
.kbd {
  margin-left: auto;
  font-size: 12px;
  color: var(--text-3);
  border: 1px solid var(--border-strong);
  border-radius: 5px;
  padding: 2px 7px;
  background: var(--bg);
}

/* ===== 레이아웃 ===== */
.layout {
  display: flex;
  padding-top: 68px;
  min-height: 100vh;
}

/* ===== LNB ===== */
.lnb {
  width: 300px;
  flex-shrink: 0;
  border-right: 1px solid var(--border-strong);
  height: calc(100vh - 68px);
  overflow-y: auto;
  position: fixed;
  top: 68px;
  left: 0;
  padding: 28px 16px 80px;
}
.lnb::-webkit-scrollbar { width: 7px; }
.lnb::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

/* depth 0 — top category (소개/방법론/Agent Profile 등) : 가장 진하고 큼 */
.nav-top {
  margin-bottom: 3px;
  position: relative;
}
.nav-top-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 13px 12px;
  border-radius: 10px;
  background: none;
  border: none;
  cursor: pointer;
  font-size: 17px;
  font-weight: 700;
  color: var(--text-1);
  text-align: left;
  letter-spacing: -0.01em;
}
.nav-top-btn:hover { background: var(--bg-soft); }
.nav-top-btn.active { color: var(--blue); }
.nav-top-btn .chev {
  margin-left: auto;
  width: 20px; height: 20px;
  flex-shrink: 0;
  transition: transform 0.15s ease;
  color: var(--text-2);
}
.nav-top-btn.open .chev { transform: rotate(90deg); }

/* depth 1 컨테이너 — top의 세로선이 여기를 관통 */
.nav-group-container {
  display: none;
  position: relative;
  margin: 3px 0 14px;
  padding-left: 27px;
}
.nav-group-container.open { display: block; }
.nav-group-container::before {
  content: "";
  position: absolute;
  top: 0; bottom: 10px; left: 11px;
  width: 2px;
  background: var(--border-strong);
}

/* depth 1 — group label (금융비서 Agent / Foundation 등) : 두번째로 진함 */
.nav-group-label {
  font-size: 15.5px;
  font-weight: 700;
  color: var(--text-1);
  padding: 12px 12px 6px 4px;
  letter-spacing: -0.01em;
  margin-top: 8px;
}
.nav-group-label:first-child { margin-top: 0; }

/* depth 2 — agent / sub-category (AI금융비서 Master 등) */
.nav-item-wrap { position: relative; }
.nav-item-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 9px 12px 9px 4px;
  border-radius: 8px;
  background: none;
  border: none;
  cursor: pointer;
  font-size: 15px;
  font-weight: 500;
  color: var(--text-2);
  text-align: left;
}
.nav-item-btn:hover { background: var(--bg-soft); color: var(--text-1); }
.nav-item-btn.active-leaf { background: var(--blue-bg); color: var(--blue); font-weight: 700; }
.nav-item-btn .chev-sm {
  margin-left: auto;
  width: 16px; height: 16px;
  flex-shrink: 0;
  transition: transform 0.15s ease;
  color: var(--text-3);
}
.nav-item-btn.open .chev-sm { transform: rotate(90deg); }

/* depth 3 컨테이너 — 자체 세로선 */
.nav-leaf-group {
  display: none;
  position: relative;
  margin: 2px 0 8px;
  padding-left: 24px;
}
.nav-leaf-group.open { display: block; }
.nav-leaf-group::before {
  content: "";
  position: absolute;
  top: 0; bottom: 6px; left: 11px;
  width: 2px;
  background: var(--border);
}
.nav-leaf-btn {
  width: 100%;
  display: block;
  padding: 8px 12px 8px 4px;
  border-radius: 7px;
  background: none;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-3);
  text-align: left;
}
.nav-leaf-btn:hover { background: var(--bg-soft); color: var(--text-1); }
.nav-leaf-btn.active-leaf { background: var(--blue-bg); color: var(--blue); font-weight: 700; }

/* ===== 메인 콘텐츠 ===== */
.main {
  margin-left: 300px;
  flex: 1;
  min-width: 0;
  display: flex;
  justify-content: center;
}
.content-wrap {
  display: flex;
  width: 100%;
  max-width: 1600px;
  gap: 64px;
  padding: 56px 48px 160px 40px;
}
.content {
  flex: 1;
  min-width: 0;
  max-width: 1040px;
}

/* 우측 On This Page TOC */
.toc {
  width: 200px;
  flex-shrink: 0;
  position: sticky;
  top: 96px;
  align-self: flex-start;
  height: fit-content;
}
.toc-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-3);
  letter-spacing: 0.04em;
  margin-bottom: 14px;
}
.toc-list { display: flex; flex-direction: column; gap: 10px; }
.toc-link {
  font-size: 14px;
  color: var(--text-3);
  text-decoration: none;
  cursor: pointer;
  line-height: 1.5;
  border-left: 2px solid transparent;
  padding-left: 12px;
}
.toc-link:hover { color: var(--text-1); }
.toc-link.active { color: var(--blue); font-weight: 600; border-left-color: var(--blue); }

.crumb {
  font-size: 14px;
  color: var(--text-3);
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.crumb span:last-child { color: var(--text-2); }

.page-title {
  font-size: 38px;
  font-weight: 700;
  color: var(--text-1);
  margin-bottom: 16px;
  letter-spacing: -0.02em;
}
.page-desc {
  font-size: 17px;
  color: var(--text-2);
  line-height: 1.75;
  margin-bottom: 48px;
  max-width: 680px;
}

.section-block { margin-bottom: 56px; }
.section-block-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-1);
  margin-bottom: 18px;
}

/* 카드 그리드 (홈 화면) */
.card-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}
.nav-card {
  border: 1px solid var(--border-strong);
  border-radius: 16px;
  padding: 26px;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.nav-card:hover {
  border-color: var(--blue);
  box-shadow: 0 4px 14px rgba(49,130,246,0.1);
}
.nav-card-icon {
  width: 42px; height: 42px;
  border-radius: 11px;
  background: var(--blue-bg);
  color: var(--blue);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 8px;
}
.nav-card-title { font-size: 17px; font-weight: 700; color: var(--text-1); }
.nav-card-desc { font-size: 14px; color: var(--text-3); line-height: 1.5; }

/* 진행 상태 배지 */
.status-row { display: flex; gap: 20px; margin-bottom: 48px; flex-wrap: wrap; }
.status-chip {
  display: flex; align-items: center; gap: 10px;
  border: 1px solid var(--border-strong);
  border-radius: 12px;
  padding: 14px 20px;
  font-size: 14px;
  color: var(--text-2);
}
.status-chip b { color: var(--text-1); font-size: 19px; }

/* 콘텐츠 미발행 placeholder */
.empty-state {
  border: 1.5px dashed var(--border-strong);
  border-radius: 16px;
  padding: 80px 28px;
  text-align: center;
  color: var(--text-3);
  font-size: 15px;
}
.empty-state strong { display: block; color: var(--text-2); font-size: 17px; margin-bottom: 8px; }

iframe.doc-frame {
  width: 100%;
  border: none;
  min-height: calc(100vh - 68px);
}

@media (max-width: 1100px) {
  .toc { display: none; }
}
@media (max-width: 900px) {
  .lnb { display: none; }
  .main { margin-left: 0; }
}

/* ===== 문서 본문(Prose) 스타일 ===== */
.prose {
  scroll-margin-top: 96px;
}
.prose h2 {
  font-size: 23px;
  font-weight: 700;
  color: var(--text-1);
  margin: 40px 0 48px;
  letter-spacing: -0.01em;
  scroll-margin-top: 96px;
}
.prose h2:first-child { margin-top: 0; }
.prose p {
  font-size: 16px;
  color: var(--text-2);
  line-height: 1.8;
  margin-bottom: 16px;
}
.prose .lead {
  font-size: 18px;
  color: var(--text-1);
  line-height: 1.75;
  margin-bottom: 8px;
}

/* 메타 정보 바 (Agent / 문서ID / 버전 등) */
.meta-bar {
  display: grid;
  grid-template-columns: 30fr 10fr 15fr 25fr 10fr 10fr;
  gap: 32px;
  padding: 28px 0;
  border-top: 1px solid var(--border-strong);
  border-bottom: 1px solid var(--border-strong);
  margin: 28px 0 56px;
}
.meta-item { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
.meta-label { font-size: 12px; font-weight: 600; color: var(--text-3); letter-spacing: 0.03em; }
.meta-value { font-size: 14.5px; font-weight: 600; color: var(--text-1); }
.meta-value.accent { color: var(--blue); }

/* 뱃지 row */
.pill-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }
.pill { font-size: 13px; font-weight: 600; padding: 6px 14px; border-radius: 20px; }
.pill-master { background: #F0EEFE; color: #6938D6; }
.pill-sub { background: var(--blue-bg); color: var(--blue); }
.pill-scope { background: var(--bg-soft); color: var(--text-2); border: 1px solid var(--border-strong); }

/* 단일 큰 박스 — 화이트 + 라인 (기본형) */
.box {
  border: 1px solid var(--border-strong);
  border-radius: 16px;
  padding: 32px 36px;
  margin-bottom: 40px;
}
.box-row {
  display: flex;
  padding: 18px 0;
  border-bottom: 1px solid var(--border);
  gap: 32px;
}
.box-row:first-child { padding-top: 0; }
.box-row:last-child { padding-bottom: 0; border-bottom: none; }
.box-row-label {
  width: 140px;
  flex-shrink: 0;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-3);
  padding-top: 1px;
}
.box-row-value {
  font-size: 15.5px;
  color: var(--text-1);
  line-height: 1.7;
  flex: 1;
}
.box-row-value.muted { color: var(--text-2); }

/* 단일 큰 박스 — 하늘색 BG, 라인 없음 (강조형) */
.box-tint {
  background: var(--blue-bg);
  border-radius: 16px;
  padding: 32px 36px;
  border: none;
  margin-bottom: 40px;
}
.box-tint .box-row { border-bottom: 1px solid rgba(49,130,246,0.12); }
.box-tint .box-row-label { color: #5A8FE0; }
.box-tint .box-row-value { color: #1B4FA0; }

/* 리스트 카드 — 단일 박스 안에 항목 나열 */
.list-card {
  border: 1px solid var(--border-strong);
  border-radius: 16px;
  padding: 32px 36px;
  margin-bottom: 16px;
}
/* 같은 섹션 안에서 연속되는 list-card는 16px만, 섹션의 마지막 요소는 JS가 .box-last 클래스를 부여 */
.list-card.box-last { margin-bottom: 40px; }
.list-card-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-1);
  margin-bottom: 18px;
}
.list-row {
  display: flex;
  gap: 12px;
  font-size: 16px;
  color: var(--text-2);
  line-height: 1.7;
  margin-bottom: 13px;
}
.list-row:last-child { margin-bottom: 0; }
.list-row-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--blue);
  flex-shrink: 0;
  margin-top: 9px;
}

/* Agent 관계 다이어그램 */
.rel-flow {
  display: flex;
  align-items: flex-start;
  gap: 0;
  overflow-x: auto;
  padding: 8px 4px 16px;
}

/* 분기 다이어그램 — 1개 시작점에서 여러 갈래로 뻗는 구조 */
.branch-diagram {
  display: flex;
  align-items: center;
  gap: 0;
}
.branch-source {
  flex-shrink: 0;
}
.branch-source-box {
  border-radius: 12px;
  padding: 16px 20px;
  text-align: center;
  font-size: 14px;
  font-weight: 700;
  background: var(--blue);
  color: #fff;
  min-width: 140px;
}
.branch-source-box .branch-sub { font-size: 11.5px; font-weight: 500; opacity: 0.85; display: block; margin-top: 3px; }
.branch-connector {
  flex-shrink: 0;
  width: 48px;
  position: relative;
  align-self: stretch;
  display: flex;
  align-items: center;
}
.branch-connector::before {
  content: "";
  position: absolute;
  left: 0; top: 50%;
  width: 24px;
  height: 2px;
  background: var(--border-strong);
}
.branch-connector::after {
  content: "";
  position: absolute;
  left: 24px; top: 0; bottom: 0;
  width: 2px;
  background: var(--border-strong);
}
.branch-targets {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.branch-target-row {
  display: flex;
  align-items: center;
  gap: 0;
  position: relative;
}
.branch-target-row::before {
  content: "";
  position: absolute;
  left: -24px;
  top: 50%;
  width: 24px;
  height: 2px;
  background: var(--border-strong);
}
.branch-target-box {
  border: 1px solid var(--border-strong);
  border-radius: 10px;
  padding: 11px 16px;
  font-size: 13.5px;
  font-weight: 700;
  color: var(--text-1);
  background: #fff;
  min-width: 130px;
  flex-shrink: 0;
}
.branch-target-desc {
  font-size: 13.5px;
  color: var(--text-2);
  padding-left: 16px;
  line-height: 1.5;
}
.rel-node {
  flex-shrink: 0;
  min-width: 168px;
}
.rel-box {
  border-radius: 12px;
  padding: 14px 16px;
  text-align: center;
  font-size: 14px;
  font-weight: 700;
}
.rel-box-prev { background: var(--bg-soft); border: 1px solid var(--border-strong); color: var(--text-2); }
.rel-box-current { background: var(--blue); color: #fff; }
.rel-box-next { background: var(--bg-soft); border: 1px solid var(--border-strong); color: var(--text-2); }
.rel-sub { font-size: 11.5px; font-weight: 500; opacity: 0.8; display: block; margin-top: 3px; }
.rel-label { font-size: 12px; color: var(--text-3); text-align: center; margin-top: 8px; line-height: 1.5; }
.rel-arrow { flex-shrink: 0; width: 40px; display: flex; align-items: center; justify-content: center; padding-top: 28px; color: var(--text-3); }
.rel-sub-stack { display: flex; flex-direction: column; gap: 6px; min-width: 168px; }

/* 노트 박스 (제약/주의사항) — 하늘색 톤과 구분되는 옐로우 톤, 라인 없음 */
.note-box {
  background: #FFF8E8;
  border-radius: 16px;
  padding: 32px 36px;
  border: none;
}
.note-box-title {
  font-size: 14px;
  font-weight: 700;
  color: #946800;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.note-row {
  display: flex;
  gap: 12px;
  font-size: 15.5px;
  color: #5C4500;
  line-height: 1.7;
  margin-bottom: 12px;
}
.note-row:last-child { margin-bottom: 0; }
.note-row-dot { width: 5px; height: 5px; border-radius: 50%; background: #C98A00; flex-shrink: 0; margin-top: 9px; }

/* 태그 묶음 (UX 핵심 포인트 등) */
.tag-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
.tag-chip { font-size: 13.5px; font-weight: 500; color: var(--text-2); background: var(--bg-soft); border: 1px solid var(--border-strong); padding: 7px 14px; border-radius: 9px; }

/* 업무 단계 카드 — 헤더 + 3단 컬럼 */
.task-card {
  border: 1px solid var(--border-strong);
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 16px;
}
.task-card.box-last { margin-bottom: 40px; }
.task-card-head {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 20px 28px;
  border-bottom: 1px solid var(--border-strong);
  background: var(--bg-soft);
}
.task-card-num {
  flex-shrink: 0;
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  background: var(--blue);
  padding: 5px 12px;
  border-radius: 8px;
  white-space: nowrap;
}
.task-card-title { font-size: 16px; font-weight: 700; color: var(--text-1); }
.task-card-body {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
}
.task-col {
  padding: 22px 24px;
  border-right: 1px solid var(--border);
}
.task-col:last-child { border-right: none; }
.task-col-label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.04em;
  margin-bottom: 12px;
  text-transform: uppercase;
}
.task-col-label.cond { color: #1B7A4D; }
.task-col-label.ui { color: #5A4FCF; }
.task-col-label.exc { color: #C2530E; }
.task-col-item {
  display: flex;
  gap: 8px;
  font-size: 14px;
  color: var(--text-2);
  line-height: 1.6;
  margin-bottom: 9px;
}
.task-col-item:last-child { margin-bottom: 0; }
.task-col-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 8px; }
.task-col-item.cond .task-col-dot { background: #1B7A4D; }
.task-col-item.ui .task-col-dot { background: #5A4FCF; }
.task-col-item.exc .task-col-dot { background: #C2530E; }
.task-range-box {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  font-size: 13px;
  color: var(--text-3);
  line-height: 1.7;
}
.task-range-box b { color: var(--text-1); display: block; margin-bottom: 4px; font-weight: 700; }

/* 데이터 테이블 (슬롯 정의 / 발화 정의) */
.data-table {
  width: 100%;
  border-collapse: collapse;
  border: 1px solid var(--border-strong);
  border-radius: 16px;
  overflow: hidden;
}
.data-table th {
  background: var(--bg-soft);
  font-size: 13px;
  font-weight: 700;
  color: var(--text-2);
  padding: 14px 18px;
  text-align: left;
  border-bottom: 1px solid var(--border-strong);
}
.data-table td {
  padding: 16px 18px;
  font-size: 14.5px;
  color: var(--text-1);
  border-bottom: 1px solid var(--border);
  vertical-align: top;

/* ============================================================
   유틸: id로 노드/경로 찾기
   ============================================================ */
function findNode(nodes, id, path = []) {
  for (const n of nodes) {
    const newPath = [...path, n];
    if (n.id === id) return newPath;
    if (n.children && Array.isArray(n.children) && n.children[0] && typeof n.children[0] === 'object') {
      const found = findNode(n.children, id, newPath);
      if (found) return found;
    }
  }
  return null;
}

function countLeaves(node) {
  if (!node.children) return 1;
  if (typeof node.children[0] === 'string') return 1;
  return node.children.reduce((sum, c) => sum + countLeaves(c), 0);
}

  const lnb = document.getElementById('lnb');
  lnb.innerHTML = NAV.map(top => renderTop(top)).join('');
}

function renderTop(top) {
  if (top.type === 'page') {
    return `
      <div class="nav-top">
        <button class="nav-top-btn" data-nav="${top.id}" onclick="selectPage('${top.id}')">
          ${top.label}
        </button>
      </div>`;
  }
  const childrenHtml = (top.children || []).map(g => renderGroup(g, top.id)).join('');
  return `
    <div class="nav-top">
      <button class="nav-top-btn" data-toggle="top-${top.id}" onclick="toggleTop('${top.id}')">
        ${top.label}${CHEV}
      </button>
      <div class="nav-group-container" id="top-${top.id}">${childrenHtml}</div>
    </div>`;
}

function renderGroup(g, topId) {
  // g.type === 'group' (depth1 그룹, 예: 금융비서 Agent / Foundation)
  if (g.type === 'group') {
    const itemsHtml = (g.children || []).map(item => renderItem(item)).join('');
    return `
      <div class="nav-group-label">${g.label}</div>
      ${itemsHtml}`;
  }
  // 단일 leaf (드물게 top 바로 아래 leaf)
  return renderItem(g);
}

function renderItem(item) {
  // depth2: leaf (단순 페이지) / leaf3 (3depth: 사용자케이스/대화흐름/업무설계) 
  if (item.type === 'leaf') {
    return `
      <div class="nav-item-wrap">
        <button class="nav-item-btn" data-leaf="${item.id}" onclick="selectLeaf('${item.id}')">${item.label}</button>
      </div>`;
  }
  if (item.type === 'leaf3') {
    const subId = 'sub-' + item.id;
    const subsHtml = (item.children || []).map((label, i) => {
      const leafId = item.id + '__' + i;
      return `<button class="nav-leaf-btn" data-leaf="${leafId}" onclick="selectLeaf('${leafId}', '${item.label} · ${label}')">${label}</button>`;
    }).join('');
    return `
      <div class="nav-item-wrap">
        <button class="nav-item-btn" data-toggle="${subId}" onclick="toggleSub('${subId}')">${item.label}${CHEV_SM}</button>
        <div class="nav-leaf-group" id="${subId}">${subsHtml}</div>
      </div>`;
  }
  // 더 깊은 그룹 (예: ux-layout-header 하위 Height/Title 등 — 단순 string 배열)
  if (item.children && typeof item.children[0] === 'string') {
    const subId = 'sub-' + item.id;
    const subsHtml = item.children.map((label, i) => {
      const leafId = item.id + '__' + i;
      return `<button class="nav-leaf-btn" data-leaf="${leafId}" onclick="selectLeaf('${leafId}', '${item.label} · ${label}')">${label}</button>`;
    }).join('');
    return `
      <div class="nav-item-wrap">
        <button class="nav-item-btn" data-toggle="${subId}" onclick="toggleSub('${subId}')">${item.label}${CHEV_SM}</button>
        <div class="nav-leaf-group" id="${subId}">${subsHtml}</div>
      </div>`;
  }
  // group type item (예: ux-layout 하위 Header가 group인 경우는 위에서 처리되므로 거의 안 옴)
  return renderGroup(item);
}

function toggleTop(id) {
  const el = document.getElementById('top-' + id);
  const btn = document.querySelector(`[data-toggle="top-${id}"]`);
  const isOpen = el.classList.contains('open');
  // 같은 레벨의 다른 top은 닫지 않음 (아코디언 강제하지 않음 — 여러 개 펼쳐둘 수 있게)
  el.classList.toggle('open');
  btn.classList.toggle('open');
}

function toggleSub(id) {
  const el = document.getElementById(id);
  const btn = document.querySelector(`[data-toggle="${id}"]`);
  el.classList.toggle('open');
  btn.classList.toggle('open');
}

function setActiveTop(topId) {
  document.querySelectorAll('.nav-top-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`[data-nav="${topId}"]`);
  if (btn) btn.classList.add('active');
}

function clearActiveLeaf() {
  document.querySelectorAll('.nav-item-btn, .nav-leaf-btn').forEach(b => b.classList.remove('active-leaf'));
}

/* ============================================================
   페이지 렌더링
   ============================================================ */
function goHome() {
  selectPage('intro');
}

function selectPage(id) {
  currentLeafId = null;
  setActiveTop(id);
  clearActiveLeaf();
  renderHome(id);
  window.scrollTo(0, 0);
}

function selectLeaf(id, customLabel) {
  currentLeafId = id;
  document.querySelectorAll('.nav-top-btn').forEach(b => b.classList.remove('active'));
  clearActiveLeaf();
  const btn = document.querySelector(`[data-leaf="${id}"]`);
  if (btn) btn.classList.add('active-leaf');
  renderLeafPage(id, customLabel);
  window.scrollTo(0, 0);
}

const TOP_DESC = {
  intro: "이 가이드 시스템의 목적과 사용법을 소개합니다.",
  method: "NH AI Agent UX 가이드 시스템이 따르는 설계 방법론을 설명합니다.",
};

function renderHome(topId) {
  const top = NAV.find(n => n.id === topId);
  const content = document.getElementById('content');

  if (top.type === 'page') {
    if (DOCS[top.id]) {
      content.innerHTML = `<div class="crumb"><span>${top.label}</span></div>` + DOCS[top.id].html;
      renderTOC(DOCS[top.id].toc || []);
      return;
    }
    content.innerHTML = `
      <div class="crumb"><span>${top.label}</span></div>
      <div class="page-title">${top.label}</div>
      <div class="page-desc">${TOP_DESC[top.id] || ''}</div>
      <div class="empty-state">
        <strong>아직 작성 중인 문서예요</strong>
        콘텐츠가 준비되면 이 영역에 표시됩니다.
      </div>`;
    renderTOC([]);
    return;
  }

  // 그룹 top — 하위 그룹/아이템들을 카드로 보여주기
  const totalLeaves = top.children.reduce((sum, c) => sum + countLeaves(c), 0);

  let cardsHtml = '';
  const tocItems = [];
  top.children.forEach((group, idx) => {
    const secId = 'sec-' + idx;
    tocItems.push({ id: secId, label: group.label });
    cardsHtml += `<div class="section-block" id="${secId}">
      <div class="section-block-title">${group.label}</div>
      <div class="card-grid">`;
    (group.children || []).forEach(item => {
      const leafCount = item.children ? (typeof item.children[0] === 'string' ? item.children.length : countLeaves(item)) : 1;
      cardsHtml += `
        <div class="nav-card" onclick="${item.type === 'leaf' ? `selectLeaf('${item.id}')` : `expandAndScroll('${top.id}','${group.id}','${item.id}')`}">
          <div class="nav-card-icon">${ICONS[top.id] || ''}</div>
          <div class="nav-card-title">${item.label}</div>
          <div class="nav-card-desc">${item.type === 'leaf' ? '문서 1건' : leafCount + '개 하위 문서'}</div>
        </div>`;
    });
    cardsHtml += `</div></div>`;
  });

  content.innerHTML = `
    <div class="crumb"><span>${top.label}</span></div>
    <div class="page-title">${top.label}</div>
    <div class="page-desc">${top.desc || ''}</div>
    <div class="status-row">
      <div class="status-chip"><b>${top.children.length}</b>개 카테고리</div>
      <div class="status-chip"><b>${totalLeaves}</b>개 하위 문서</div>
    </div>
    ${cardsHtml}
  `;

  renderTOC(tocItems);
}

function renderTOC(items) {
  const toc = document.getElementById('toc');
  if (!items || !items.length) { toc.innerHTML = ''; return; }
  toc.innerHTML = `
    <div class="toc-title">ON THIS PAGE</div>
    <div class="toc-list">
      ${items.map((it, i) => `<a class="toc-link${i === 0 ? ' active' : ''}" data-target="${it.id}" onclick="scrollToSection('${it.id}')">${it.label}</a>`).join('')}
    </div>
  `;
}

function scrollToSection(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.querySelectorAll('.toc-link').forEach(l => l.classList.remove('active'));
  const link = document.querySelector(`.toc-link[data-target="${id}"]`);
  if (link) link.classList.add('active');
}

function expandAndScroll(topId, groupId, itemId) {
  // LNB에서 해당 top, item을 펼쳐주기
  const topEl = document.getElementById('top-' + topId);
  const topBtn = document.querySelector(`[data-toggle="top-${topId}"]`);
  if (topEl && !topEl.classList.contains('open')) {
    topEl.classList.add('open');
    topBtn.classList.add('open');
  }
  const subId = 'sub-' + itemId;
  const subEl = document.getElementById(subId);
  const subBtn = document.querySelector(`[data-toggle="${subId}"]`);
  if (subEl) {
    subEl.classList.add('open');
    subBtn.classList.add('open');
    subEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function renderLeafPage(id, customLabel) {
  const content = document.getElementById('content');
  const path = findNode(NAV, id.split('__')[0]) || [];

  let label = customLabel;
  let crumbParts = [];

  if (path.length) {
    crumbParts = path.map(p => p.label);
    if (!label) label = path[path.length - 1].label;
  } else {
    label = customLabel || id;
  }

  const crumbHtml = `<div class="crumb">${crumbParts.map((c, i) => `<span>${c}</span>${i < crumbParts.length - 1 ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>' : ''}`).join('')}</div>`;

  // 와이어프레임 — 새 탭에서 열기
  if (WIREFRAME_FILES[id]) {
    window.open(WIREFRAME_FILES[id], '_blank');
    content.innerHTML = `
      ${crumbHtml}
      <div class="page-title">${label}</div>
      <div class="empty-state">
        <strong>새 탭에서 화면설계서를 열었어요</strong>
        탭이 열리지 않았다면 아래 버튼을 눌러주세요.
        <div style="margin-top:20px;">
          <a href="${WIREFRAME_FILES[id]}" target="_blank" style="display:inline-flex; align-items:center; gap:8px; background:var(--blue); color:#fff; font-size:14px; font-weight:600; padding:10px 20px; border-radius:10px; text-decoration:none;">
            화면설계서 새 탭에서 열기
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </a>
        </div>
      </div>
    `;
    renderTOC([]);
    return;
  }

  // 실제 콘텐츠가 준비된 문서
  if (DOCS[id]) {
    content.innerHTML = crumbHtml + DOCS[id].html;
    renderTOC(DOCS[id].toc || []);
    return;
  }

  content.innerHTML = `
    ${crumbHtml}
    <div class="page-title">${label}</div>
    <div class="empty-state">
      <strong>아직 작성 중인 문서예요</strong>
      콘텐츠가 준비되면 이 영역에 표시됩니다.
    </div>
  `;
  renderTOC([]);
}
